<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inquiries - ROOM FINDER</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Room Finder" height="40" class="me-2">ROOM FINDER
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="find.html">Find Room</a></li>
                    <li class="nav-item user-only"><a class="nav-link active" href="my-inquiries.html">My Inquiries</a></li>
                    <li class="nav-item owner-only d-none"><a class="nav-link" href="messages.html">Inbox</a></li>
                    <li class="nav-item owner-only d-none"><a class="nav-link" href="add.html">Add Room</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="ms-lg-3 d-flex align-items-center gap-2">
                        <span id="roleIndicator" class="badge rounded-pill bg-light text-primary border px-3 py-2 fw-bold">
                            <i class="bi bi-person-circle me-1"></i> USER MODE
                        </span>
                        <button id="roleToggle" class="btn btn-sm btn-primary rounded-pill px-3" onclick="toggleRole()">
                            <i class="bi bi-arrow-left-right me-1"></i> Switch Mode
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div id="authSection" class="text-center py-5">
            <div class="card border-0 shadow-sm p-5 max-width-500 mx-auto rounded-5">
                <i class="bi bi-person-lock text-primary mb-3" style="font-size: 4rem;"></i>
                <h3 class="fw-bold">View My Sent Messages</h3>
                <p class="text-secondary mb-4">Enter your name and phone to securely view your inquiry history.</p>
                <div class="mb-3">
                    <input type="text" id="viewName" class="form-control text-center py-3" placeholder="Your Name">
                </div>
                <div class="mb-4">
                    <input type="tel" id="viewPhone" class="form-control text-center py-3" placeholder="Your Phone Number">
                </div>
                <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="viewUserMessages()">VIEW MY HISTORY</button>
            </div>
        </div>

        <div id="userInboxContainer" class="d-none">
            <h2 class="fw-bold mb-4">My Inquiry History</h2>
            <div id="userMessages">
                <!-- User's messages will load here -->
            </div>
            <div class="text-center mt-5">
                <button class="btn btn-outline-secondary rounded-pill px-4" onclick="location.reload()">Back to Login</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Room Finder.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
    <script>
        function viewUserMessages() {
            const name = document.getElementById('viewName').value.toLowerCase().trim();
            const phone = document.getElementById('viewPhone').value.trim();
            
            if(!name || !phone) {
                alert('Please enter both details to confirm your identity.');
                return;
            }

            const allInquiries = JSON.parse(localStorage.getItem('vzm_inquiries') || '[]');
            const filtered = allInquiries.filter(msg => 
                msg.from.toLowerCase().trim() === name && 
                msg.phone.trim() === phone
            );

            document.getElementById('authSection').classList.add('d-none');
            document.getElementById('userInboxContainer').classList.remove('d-none');

            const container = document.getElementById('userMessages');
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-secondary">
                        <i class="bi bi-chat-square-dots mb-3" style="font-size: 3rem;"></i>
                        <p>No messages found for this name and phone. Make sure you use the same details you used when contacting an owner.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            filtered.reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'card border-0 shadow-sm p-4 mb-3 rounded-4';
                
                let replyHtml = '<p class="text-muted small mt-2">Waiting for owner response...</p>';
                if (msg.reply) {
                    replyHtml = `
                        <div class="mt-3 p-3 bg-primary-subtle border-start border-4 border-primary rounded-3 text-dark">
                            <p class="small fw-bold mb-1"><i class="bi bi-reply-all-fill me-1"></i>Owner Reply (${msg.replyDate}):</p>
                            <p class="mb-0 italic">"${msg.reply}"</p>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start border-bottom pb-3 mb-3">
                        <div>
                            <h5 class="fw-bold text-primary mb-1">To Owner: ${msg.to}</h5>
                            <p class="mb-0 text-secondary small">Room: ${msg.room}</p>
                        </div>
                        <span class="badge bg-light text-primary">${msg.date}</span>
                    </div>
                    <div class="mb-2">
                        <p class="mb-1 fw-semibold small">My Message:</p>
                        <p class="text-secondary">"${msg.text}"</p>
                    </div>
                    ${replyHtml}
                `;
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
