<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Inbox - ROOM FINDER</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .inbox-card {
            background: white;
            border-radius: 15px;
            border-left: 5px solid var(--primary-color);
            transition: var(--transition);
        }
        .inbox-card:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow);
        }
        .empty-inbox {
            text-align: center;
            padding: 100px 0;
            color: #cbd5e1;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Room Finder" height="40" class="me-2">ROOM FINDER
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="find.html">Find Room</a></li>
                    <!-- User Only -->
                    <li class="nav-item user-only"><a class="nav-link" href="my-inquiries.html">My Inquiries</a></li>
                    <!-- Owner Only -->
                    <li class="nav-item owner-only d-none"><a class="nav-link" href="messages.html">Inbox</a></li>
                    <li class="nav-item owner-only d-none"><a class="nav-link" href="add.html">Add Room</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="ms-lg-3 d-flex align-items-center gap-2">
                        <span id="roleIndicator" class="badge rounded-pill bg-light text-primary border px-3 py-2 fw-bold">
                            <i class="bi bi-person-circle me-1"></i> USER MODE
                        </span>
                        <button id="roleToggle" class="btn btn-sm btn-primary rounded-pill px-3" onclick="toggleRole()">
                            <i class="bi bi-arrow-left-right me-1"></i> Switch Mode
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"><i class="bi bi-envelope-paper-fill me-2 text-primary"></i>Inquiries Inbox</h2>
            <button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="clearInbox()">Clear All</button>
        </div>

        <div id="inboxContainer">
            <!-- Messages will load here -->
        </div>
    </div>

    <!-- Reply Modal -->
    <div class="modal fade" id="replyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header bg-dark text-white border-0 py-3">
                    <h5 class="modal-title fw-bold"><i class="bi bi-reply-fill me-2"></i>Send Reply</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="replyForm">
                        <input type="hidden" id="replyMsgId">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Your Reply</label>
                            <textarea id="replyText" class="form-control" rows="4" placeholder="Type your response here..." required></textarea>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark py-2 fw-bold rounded-pill">SEND REPLY</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5">
        <div class="container text-center">
            <p>&copy; 2026 Room Finder.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadInbox();

            const replyForm = document.getElementById('replyForm');
            if (replyForm) {
                replyForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const id = parseInt(document.getElementById('replyMsgId').value);
                    const text = document.getElementById('replyText').value;
                    
                    let messages = JSON.parse(localStorage.getItem('vzm_inquiries') || '[]');
                    const index = messages.findIndex(m => m.id === id);
                    if (index !== -1) {
                        messages[index].reply = text;
                        messages[index].replyDate = new Date().toLocaleString();
                        localStorage.setItem('vzm_inquiries', JSON.stringify(messages));
                        
                        const modalEl = document.getElementById('replyModal');
                        const modalInstance = bootstrap.Modal.getInstance(modalEl);
                        modalInstance.hide();
                        
                        alert('Reply saved and "sent" successfully!');
                        loadInbox();
                        replyForm.reset();
                    }
                });
            }
        });

        function loadInbox() {
            const container = document.getElementById('inboxContainer');
            const messages = JSON.parse(localStorage.getItem('vzm_inquiries') || '[]');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-inbox">
                        <i class="bi bi-chat-left-dots" style="font-size: 5rem;"></i>
                        <h4 class="mt-3">No messages yet.</h4>
                        <p>When users contact you about your rooms, they will appear here.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            // Show newest first
            [...messages].reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'inbox-card p-4 mb-4 shadow-sm';
                
                let replyHtml = '';
                if (msg.reply) {
                    replyHtml = `
                        <div class="mt-3 p-3 bg-light border-start border-4 border-dark rounded-3">
                            <p class="small fw-bold mb-1"><i class="bi bi-reply-all-fill me-1"></i>Your Reply (${msg.replyDate}):</p>
                            <p class="mb-0 text-muted italic">"${msg.reply}"</p>
                        </div>
                    `;
                }

                div.innerHTML = `
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <h6 class="fw-bold mb-1"><i class="bi bi-person-circle me-2"></i>${msg.from}</h6>
                            <p class="small text-secondary mb-0">${msg.phone}</p>
                            <span class="badge bg-light text-primary mt-2">${msg.date}</span>
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <p class="fw-semibold mb-1 text-dark">Property: ${msg.room}</p>
                            <p class="text-secondary mb-0">"${msg.text}"</p>
                            ${replyHtml}
                        </div>
                        <div class="col-md-3 text-md-end mt-3 mt-md-0">
                            <button class="btn btn-dark btn-sm me-1" onclick="openReplyModal(${msg.id})">
                                <i class="bi bi-reply-fill"></i> Reply
                            </button>
                            <a href="tel:${msg.phone}" class="btn btn-outline-primary btn-sm me-1"><i class="bi bi-telephone-fill"></i></a>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteMessage(${msg.id})"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openReplyModal(id) {
            document.getElementById('replyMsgId').value = id;
            const modal = new bootstrap.Modal(document.getElementById('replyModal'));
            modal.show();
        }

        function deleteMessage(id) {
            if(confirm('Delete this inquiry?')) {
                let messages = JSON.parse(localStorage.getItem('vzm_inquiries') || '[]');
                messages = messages.filter(m => m.id !== id);
                localStorage.setItem('vzm_inquiries', JSON.stringify(messages));
                loadInbox();
            }
        }

        function clearInbox() {
            if(confirm('Are you sure you want to clear your entire inbox?')) {
                localStorage.setItem('vzm_inquiries', '[]');
                loadInbox();
            }
        }
    </script>
</body>
</html>
